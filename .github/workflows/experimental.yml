name: Experimental builds (macOS / Linux)

on:
  workflow_dispatch: # 在 Actions 标签页手动触发

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target universal-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: md-reader-macos
          retention-days: 14
          if-no-files-found: warn
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/docker/linux/Dockerfile
          tags: md-reader-linux-builder:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/build \
            -e CI=true \
            md-reader-linux-builder:latest \
            /bin/bash -c "chmod +x .github/docker/linux/build.sh && .github/docker/linux/build.sh"

      - name: Fix artifact ownership
        run: sudo chown -R $USER:$USER src-tauri/target

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: md-reader-linux
          retention-days: 30
          if-no-files-found: warn
          path: src-tauri/target/release/bundle/appimage/*.AppImage
