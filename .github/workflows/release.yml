name: Release (macOS / Linux experimental)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build & attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MD Reader ${{ github.ref_name }}"
          releaseBody: |
            Windows: 见下方 .msi（安装版）/ .exe（绿色版）。

            macOS / Linux 为**实验版**，由 CI 自动构建、未做代码签名：
            - macOS: 首次打开右键 → 打开，或 `xattr -dr com.apple.quarantine "MD Reader.app"`
            - Linux: AppImage 需先 `chmod +x`（基于 Rocky Linux 8 构建，兼容 GLIBC 2.28+）
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/docker/linux/Dockerfile
          tags: md-reader-linux-builder:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/build \
            -e CI=true \
            md-reader-linux-builder:latest \
            /bin/bash -c "chmod +x .github/docker/linux/build.sh && .github/docker/linux/build.sh"

      - name: Fix artifact ownership
        run: sudo chown -R $USER:$USER src-tauri/target

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done
